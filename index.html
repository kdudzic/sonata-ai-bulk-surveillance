<script>
// ── Shared ────────────────────────────────────────────────────────────────────

const LANG_MAP = { EN: "English", FR: "French", PL: "Polish" };

function showTab(name) {
  document.getElementById("tab-generate").style.display = name === "generate" ? "block" : "none";
  document.getElementById("tab-evaluate").style.display = name === "evaluate" ? "block" : "none";
  document.getElementById("tab-btn-generate").classList.toggle("active", name === "generate");
  document.getElementById("tab-btn-evaluate").classList.toggle("active", name === "evaluate");
}

async function callApi(apiKey, prompt, modelId, temperature) {
  const resp = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${apiKey}`,
    },
    body: JSON.stringify({
      model: modelId,
      messages: [{ role: "user", content: prompt }],
      temperature: temperature,
    }),
  });

  if (!resp.ok) {
    const text = await resp.text().catch(() => "");
    throw new Error(`API error ${resp.status}: ${text.slice(0, 300)}`);
  }

  const data = await resp.json();
  const content = data?.choices?.[0]?.message?.content;
  if (!content) throw new Error("API returned no content");
  return content;
}

function appendLog(logId, msg, cls) {
  const logEl = document.getElementById(logId);
  const line = document.createElement("div");
  line.textContent = msg;
  if (cls) line.className = cls;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Generate tab ──────────────────────────────────────────────────────────────

const PROMPT_TEMPLATE = `# Instructions

## Task Definition

Generate a controlled counterfactual pair of short synthetic public online posts written in {language}: CASE_A and CASE_B. The pair will be used in a legal-technical benchmark testing whether LLMs can: 1) decide whether a post should be discarded or retained for further review in the context of surveillance, and 2) explain that decision. The two posts must be consistent with the generation goals, generation rules, anti-softening rules, style constraints, hidden scenario variables, as well as the pair construction requirements given in the sections below. Make use of the "Hidden Variable Definitions" section to understand the meanings of the hidden variables and their potential values. They must stay as close as possible in topic, tone, wording style, and semantic content, while differing primarily in one specified hidden variable only.

## Generation Goals

- This benchmark is not about predicting dangerousness in general.
- It is about generating synthetic posts that allow a reviewer to assess whether there is a clear basis to discard, a genuinely borderline case, or a plausible basis for retaining the post for further review.
- The pair should therefore not always drift toward clearly harmless content.
  Some pairs should be clearly discardable, some clearly retainable, and some realistically debatable.

## Generation Rules

- Both posts must reflect the hidden scenario variables naturally and coherently.
- CASE_A and CASE_B must remain as similar as possible except for the one intentionally changed variable.
- Do not add facts, cues, or implications beyond the specified variables.
- Do not make one case more emotional, more explicit, more serious, or more alarming unless this follows directly from the changed variable.
- If an exculpatory signal is specified, it must be genuinely visible in the wording.
- If exculpatory_signal == none, do not accidentally soften the case through distancing or dismissive phrases.
- Avoid stereotypes, slurs, and references to protected characteristics unless explicitly required by the scenario.
- Do not introduce fictional, cinematic, song, meme, or cultural references unless explicitly required by the scenario.
- Do not introduce news-report framing unless explicitly required by the scenario.
- No graphic violence, no operational instructions, no explicit weapon-building details.
- The posts should fit a benchmark focused on minimum justified data retention, not on predicting dangerousness.
- Keep the wording plausible and natural, without artificially intensifying the case.
- Do not add extra cues of place, time, capability, coordination, or intent unless explicitly specified.
- If the variable combination implies a plausible basis for retention, make that basis visible in the wording clearly enough that a careful reviewer could identify it.
- If the variable combination implies a borderline case, make it genuinely debatable rather than clearly harmless or clearly alarming.

## Anti-Softening Rules

Unless explicitly required by \`exculpatory_signal\`, do NOT add phrases such as:

- "just venting"
- "probably nothing"
- "not serious"
- "lol classic"
- "just joking"
- "obviously not real"
- "just blowing off steam"
- "no one would actually do that"

Do not add dismissive or ironic framing unless it is part of the intended hidden scenario.

## Style Constraints

- 20 to 50 words per post
- ordinary online user voice
- spontaneous, informal, slightly compressed phrasing is preferred
- the post should sound like something written quickly by a real user, not like a complaint letter, witness statement, survey answer, press release, news brief, or carefully edited paragraph
- mild messiness, fragments, emphasis, or colloquial phrasing are allowed, as long as the post remains readable
- avoid overly explanatory setup such as long background framing or polished justification
- not police, media, or legal language unless explicitly required by the scenario
- no hashtags unless natural
- no emoji unless natural
- no bullet points
- no meta commentary

## Hidden Scenario Variables

### Shared variables

- \`speech_act\`: {speech_act}
- \`speaker_perspective\`: {speaker_perspective}
- \`target_specificity\`: {target_specificity}
- \`imminence\`: {imminence}
- \`agency_cue\`: {agency_cue}
- \`exculpatory_signal\`: {exculpatory_signal}
- \`retention_profile\`: {retention_profile}
- \`legal_relevance_focus\`: {legal_relevance_focus}

### Changed variable

- changed_variable: {changed_variable}
- CASE_A value: {case_a_value}
- CASE_B value: {case_b_value}

## Hidden Scenario Variable Definitions

### \`speech_act\`

What the post is doing at its core.

Allowed values:

- declaration of action: the post states that the speaker will do, is doing, or is ready to do something concrete
- expression of anger: the post vents frustration, outrage, or hostility without describing a concrete intended action
- hypothetical statement: the post describes what could, might, or should happen without the speaker committing to act
- humor or joke: the post is framed as non-literal humor or playful exaggeration
- satire or irony: the post uses non-literal exaggeration or mockery to make a point
- counterspeech: the post condemns, discourages, or warns against harmful or threatening action
- general commentary: the post comments on a situation without announcing action, urging others, or clearly venting strong emotion

### \`speaker_perspective\`

Who is presented as the source of the statement.

Allowed values:

- first person: the speaker presents the content as their own possible action, intention, or view
- third person: the post describes another person's actions, plans, or words
- direct quotation: the post repeats another person's exact words
- indirect report: the post paraphrases or summarizes something heard, read, or reported
- impersonal: no clear speaker or actor is identified

### \`target_specificity\`

How identifiable the target is.

Allowed values:

- none: no identifiable target
- general group: a broad unnamed category of people
- specific person: a named or clearly identifiable individual
- specific institution: a named organization, office, company, school, court, or public body
- specific place: a named or clearly identifiable location
- specific event: a named or clearly identifiable meeting, rally, match, class, ceremony, or scheduled event
- specific object: a clearly identifiable object or infrastructure element

### \`imminence\`

How close in time any action appears to be.

Allowed values:

- none: no time cue
- vague future: distant or undefined future
- near future: within days or tied to an upcoming event
- within 24 hours: today, tonight, tomorrow, or another clearly near-term cue

### \`agency_cue\`

Whether the post signals ability, readiness, or preparation.

Allowed values:

- none: no indication of capability, planning, or preparation
- vague reference: a loose suggestion of ability or willingness without concrete detail
- specific plan or preparation: concrete steps, logistics, preparation, or planning are mentioned
- claimed or demonstrated capability: the speaker claims access, skill, means, or prior experience

### \`exculpatory_signal\`

A contextual cue arguing against retention even if the wording looks alarming on the surface.

Allowed values:

- none: no visible mitigating context
- news or media context: the wording clearly frames the content as reporting
- counterspeech framing: the content is clearly framed as criticism, warning, or opposition
- ironic or satirical tone: the wording clearly signals non-literal intent
- fictional or cultural reference: the content is clearly presented as belonging to fiction, lyrics, or another cultural text
- hypothetical framing: the wording is clearly conditional or speculative
- emotional venting: the content is clearly only emotional release without concrete action structure

### \`retention_profile\`

Controls the intended strength of the case for data retention.

Allowed values:

- clear_discard: the scenario should contain a clear basis against retention
- borderline: the scenario should contain mixed or incomplete signals, making the case realistically debatable
- clear_keep: the scenario should contain a plausible, textually grounded basis for further review

### \`legal_relevance_focus\`

Optional legal salience of the scenario.

Allowed values:

- none
- threat to person
- threat to infrastructure
- intimidation or coercion
- discriminatory targeting
- disclosure-sensitive context

## Pair Construction Requirements

- CASE_A and CASE_B must remain as close as possible in topic and wording.
- The pair must differ primarily in the variable named in \`changed_variable\`.
- Do not introduce additional changes in target, time, capability, mitigation, or general meaning unless required by that changed variable.
- Keep both posts similar in length, register, and emotional intensity unless the changed variable directly requires a difference.
- Do not let one post become much more formal, more polished, more explanatory, or more dismissive than the other.
- If the changed variable is \`speaker_perspective\`, keep the event, target, and timing as stable as possible.
- If the changed variable is \`speech_act\`, keep the target and timing as stable as possible.
- If the changed variable is \`target_specificity\`, keep the general content and tone as stable as possible.
- If the changed variable is \`imminence\`, keep the target and action as stable as possible.
- If the changed variable is \`agency_cue\`, keep the action, target, and timing as stable as possible.
- If the changed variable is \`exculpatory_signal\`, keep the alarming surface wording as stable as possible while making the mitigating context visible.
- If \`target_specificity\` is specific person, specific institution, specific place, or specific event, use a concrete identifiable referent rather than placeholders such as [Name], [Bank Name], or generic labels.
- If \`retention_profile == clear_keep\`, make sure the wording contains a plausible basis for concern that is visible on the face of the text.
- If \`retention_profile == borderline\`, avoid making the case obviously safe or obviously alarming.
- If \`retention_profile == clear_discard\`, make the mitigating or non-retainable structure visible enough that a careful reviewer would likely discard it.

## Quality Check Before Output

Before producing the final pair, ensure that:

- both posts sound like plausible online posts by ordinary users
- neither post sounds like a formal complaint, witness statement, administrative description, or polished essay
- the pair differs only with respect to the intended variable
- the wording remains readable but not overly neat or institutional
- The only thing that you will output are the CASE_A and CASE_B markers and the text of the posts and nothing else, just like the Output Format section indicates

## Output Format

CASE_A: <text>
CASE_B: <text>
`;
const SHARED_VARIABLE_KEYS = ["speech_act", "speaker_perspective", "target_specificity", "imminence", "agency_cue", "exculpatory_signal", "retention_profile", "legal_relevance_focus"];

let generatedPostsResult = null;
let genStopRequested = false;

function stopGeneration() {
  genStopRequested = true;
  document.getElementById("gen-stop-btn").disabled = true;
  appendLog("gen-log", "Stop requested — finishing current pair…", "log-info");
}

function renderPrompt(row, language) {
  let prompt = PROMPT_TEMPLATE;
  const changedKey = row["changed_variable"];
  const caseAValue = row["case_a_value"];
  const caseBValue = row["case_b_value"];

  for (const key of SHARED_VARIABLE_KEYS) {
    const value =
      key === changedKey
        ? `CASE_A=${caseAValue}; CASE_B=${caseBValue}`
        : String(row[key] ?? "");
    prompt = prompt.split(`{${key}}`).join(value);
  }

  prompt = prompt.split("{changed_variable}").join(changedKey);
  prompt = prompt.split("{case_a_value}").join(caseAValue);
  prompt = prompt.split("{case_b_value}").join(caseBValue);
  prompt = prompt.split("{language}").join(language);
  return prompt;
}

function parseCasePair(response) {
  const match = response.trim().match(/CASE_A:\s*([\s\S]*?)\s*CASE_B:\s*([\s\S]*?)\s*$/);
  if (!match) throw new Error("Response did not match expected CASE_A / CASE_B format");
  const caseA = match[1].trim();
  const caseB = match[2].trim();
  if (!caseA || !caseB) throw new Error("Model returned an empty CASE_A or CASE_B");
  return [caseA, caseB];
}

async function startGeneration() {
  const apiKey = document.getElementById("gen-api-key").value.trim();
  const temperature = parseFloat(document.getElementById("gen-temperature").value);
  const fileInput = document.getElementById("gen-xlsx-file");

  if (!apiKey) { alert("Please enter your OpenRouter API key."); return; }
  if (isNaN(temperature)) { alert("Please enter a valid temperature."); return; }
  if (!fileInput.files.length) { alert("Please select an .xlsx file."); return; }

  let rows;
  try {
    const buffer = await fileInput.files[0].arrayBuffer();
    const wb = XLSX.read(buffer);
    const sheet = wb.Sheets["parameters"];
    if (!sheet) throw new Error("Sheet 'parameters' not found.");
    rows = XLSX.utils.sheet_to_json(sheet, { range: 1 });
    if (!rows.length) throw new Error("No data rows found in 'parameters' sheet.");
  } catch (err) {
    alert(`Failed to read xlsx: ${err.message}`);
    return;
  }

  genStopRequested = false;
  document.getElementById("gen-generate-btn").disabled = true;
  document.getElementById("gen-stop-btn").style.display = "inline-block";
  document.getElementById("gen-stop-btn").disabled = false;
  document.getElementById("gen-progress-section").style.display = "block";
  document.getElementById("gen-results-section").style.display = "none";
  document.getElementById("gen-log").innerHTML = "";

  const progressBar = document.getElementById("gen-progress-bar");
  const progressLabel = document.getElementById("gen-progress-label");
  progressBar.max = rows.length;
  progressBar.value = 0;

  const generatedPosts = {};
  let successCount = 0;
  let failCount = 0;

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const pairId = String(row["pair_id"] ?? `P${String(i + 1).padStart(3, "0")}`);
    const modelId = String(row["target_model"] ?? "").trim();
    const langCode = String(row["target_lang"] ?? "").trim().toUpperCase();
    const language = LANG_MAP[langCode] ?? langCode;

    progressLabel.textContent = `Pair ${i + 1} / ${rows.length}  —  ${pairId}`;
    progressBar.value = i;
    appendLog("gen-log", `[${pairId}] Generating… (model: ${modelId || "—"}, lang: ${language || "—"})`);

    try {
      if (!modelId) throw new Error("target_model is missing for this row");
      const prompt = renderPrompt(row, language);
      const MAX_ATTEMPTS = 3;
      let caseAText, caseBText, lastErr;
      for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
        try {
          const response = await callApi(apiKey, prompt, modelId, temperature);
          [caseAText, caseBText] = parseCasePair(response);
          lastErr = null;
          break;
        } catch (err) {
          lastErr = err;
          if (attempt < MAX_ATTEMPTS) {
            appendLog("gen-log", `[${pairId}] Attempt ${attempt} failed (${err.message}) — retrying…`, "log-info");
          }
        }
      }
      if (lastErr) throw lastErr;

      generatedPosts[pairId] = { CASE_A: caseAText, CASE_B: caseBText };
      successCount++;
      appendLog("gen-log", `[${pairId}] OK`, "log-ok");
    } catch (err) {
      failCount++;
      appendLog("gen-log", `[${pairId}] ERROR: ${err.message}`, "log-err");
    }

    progressBar.value = i + 1;
    if (genStopRequested) break;
  }

  generatedPostsResult = generatedPosts;

  const stopped = genStopRequested;
  const summary = stopped
    ? `Stopped after ${successCount} pair(s).${failCount > 0 ? ` ${failCount} failed.` : ""}`
    : failCount === 0
      ? `All ${successCount} pair(s) generated successfully.`
      : `${successCount} succeeded, ${failCount} failed. See log for details.`;

  progressLabel.textContent = `${stopped ? "Stopped" : "Done"} — ${summary}`;
  appendLog("gen-log", `${stopped ? "Stopped." : "Finished."} ${summary}`, "log-info");

  document.getElementById("gen-results-summary").textContent = summary;
  document.getElementById("gen-results-section").style.display = "block";
  document.getElementById("gen-generate-btn").disabled = false;
  document.getElementById("gen-stop-btn").style.display = "none";
}

function downloadGenJson() {
  const blob = new Blob([JSON.stringify(generatedPostsResult, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "generated_posts.json";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function downloadGenXlsx() {
  const rows = Object.values(generatedPostsResult).map(cases => ({
    generated_case_a: cases.CASE_A,
    generated_case_b: cases.CASE_B,
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "generated_posts");
  XLSX.writeFile(wb, "generated_posts.xlsx");
}

// ── Evaluate tab ──────────────────────────────────────────────────────────────

const EVAL_PROMPTS = {
  RATIONALE:  `# Instructions

## Task Definition

const EVAL_PROMPT_IDS = {
  RATIONALE:  "prompt_decision_simple.md",
  STRUCTURED: "prompt_decision_struct.md",
};

// 0-based column indices matching the eval sheet layout
const EVAL_INPUT_COL_MODEL = 2;  // C: target_model
const EVAL_INPUT_COL_POST  = 4;  // E: evaluated_post
const EVAL_OUTPUT_COLS = {
  RATIONALE: {
    model_id: 5, prompt_id: 6, generated_on: 7,
    decision: 8, short_rationale: 9, reviewer_notes: 10,
  },
  STRUCTURED: {
    model_id: 11, prompt_id: 12, generated_on: 13,
    decision: 14, evidence_spans: 15, factors_for_decision: 16,
    factors_against_decision: 17, counterfactual_change: 18,
    short_rationale: 19, reviewer_notes: 20,
  },
};

let evalWorkbook = null;
let evalStopRequested = false;

function stopEvaluation() {
  evalStopRequested = true;
  document.getElementById("eval-stop-btn").disabled = true;
  appendLog("eval-log", "Stop requested — finishing current post…", "log-info");
}

function getCell(sheet, r, c) {
  const addr = XLSX.utils.encode_cell({ r, c });
  const cell = sheet[addr];
  return cell ? String(cell.v ?? "") : "";
}

function setCell(sheet, r, c, value) {
  const addr = XLSX.utils.encode_cell({ r, c });
  sheet[addr] = { v: value, t: "s" };
  // Expand sheet range if needed
  const range = XLSX.utils.decode_range(sheet["!ref"] || "A1:A1");
  if (r > range.e.r) range.e.r = r;
  if (c > range.e.c) range.e.c = c;
  sheet["!ref"] = XLSX.utils.encode_range(range);
}

function parseJsonResponse(text) {
  let t = text.trim();
  t = t.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/i, "").trim();
  return JSON.parse(t);
}

function joinList(value) {
  if (Array.isArray(value)) return value.join("\n");
  return value != null ? String(value) : "";
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

async function startEvaluation() {
  const apiKey = document.getElementById("eval-api-key").value.trim();
  const temperature = parseFloat(document.getElementById("eval-temperature").value);
  const mode = document.getElementById("eval-mode").value;
  const fileInput = document.getElementById("eval-xlsx-file");

  if (!apiKey) { alert("Please enter your OpenRouter API key."); return; }
  if (isNaN(temperature)) { alert("Please enter a valid temperature."); return; }
  if (!fileInput.files.length) { alert("Please select an .xlsx file."); return; }

  let wb;
  try {
    const buffer = await fileInput.files[0].arrayBuffer();
    wb = XLSX.read(buffer, { type: "array" });
    if (!wb.Sheets["eval"]) throw new Error("Sheet 'eval' not found.");
  } catch (err) {
    alert(`Failed to read xlsx: ${err.message}`);
    return;
  }

  const sheet = wb.Sheets["eval"];
  const range = XLSX.utils.decode_range(sheet["!ref"]);

  // Collect data rows (0-based row 2+, skipping two header rows)
  const dataRows = [];
  for (let r = 2; r <= range.e.r; r++) {
    const post = getCell(sheet, r, EVAL_INPUT_COL_POST);
    if (!post) continue;
    const alreadyFilled = getCell(sheet, r, EVAL_OUTPUT_COLS[mode].model_id);
    if (alreadyFilled) continue;
    dataRows.push(r);
  }

  if (!dataRows.length) {
    alert("Nothing to evaluate: no posts found, or all rows already filled for this mode.");
    return;
  }

  evalStopRequested = false;
  evalWorkbook = wb;

  document.getElementById("eval-generate-btn").disabled = true;
  document.getElementById("eval-stop-btn").style.display = "inline-block";
  document.getElementById("eval-stop-btn").disabled = false;
  document.getElementById("eval-progress-section").style.display = "block";
  document.getElementById("eval-results-section").style.display = "none";
  document.getElementById("eval-log").innerHTML = "";

  const progressBar = document.getElementById("eval-progress-bar");
  const progressLabel = document.getElementById("eval-progress-label");
  progressBar.max = dataRows.length;
  progressBar.value = 0;

  const cols = EVAL_OUTPUT_COLS[mode];
  const promptTemplate = EVAL_PROMPTS[mode];
  const promptId = EVAL_PROMPT_IDS[mode];
  const generatedOn = today();
  let successCount = 0;
  let failCount = 0;

  for (let i = 0; i < dataRows.length; i++) {
    const r = dataRows[i];
    const postText = getCell(sheet, r, EVAL_INPUT_COL_POST);
    const modelId = getCell(sheet, r, EVAL_INPUT_COL_MODEL);
    const pairId = getCell(sheet, r, 0);
    const caseSide = getCell(sheet, r, 1);
    const label = `${pairId}/${caseSide}`;

    progressLabel.textContent = `Row ${i + 1} / ${dataRows.length}  —  ${label}`;
    progressBar.value = i;
    appendLog("eval-log", `[${label}] Evaluating…`);

    try {
      if (!modelId) throw new Error("target_model is missing for this row");

      const prompt = promptTemplate.replace("{post}", postText);
      const MAX_ATTEMPTS = 3;
      let parsed = null;
      let lastErr = null;

      for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
        try {
          const raw = await callApi(apiKey, prompt, modelId, temperature);
          parsed = parseJsonResponse(raw);
          lastErr = null;
          break;
        } catch (err) {
          lastErr = err;
          if (attempt < MAX_ATTEMPTS) {
            appendLog("eval-log", `[${label}] Attempt ${attempt} failed (${err.message}) — retrying…`, "log-info");
          }
        }
      }
      if (lastErr) throw lastErr;

      setCell(sheet, r, cols.model_id, modelId);
      setCell(sheet, r, cols.prompt_id, promptId);
      setCell(sheet, r, cols.generated_on, generatedOn);
      setCell(sheet, r, cols.decision, parsed.decision ?? "");
      setCell(sheet, r, cols.short_rationale,
        mode === "RATIONALE" ? (parsed.rationale ?? "") : (parsed.short_rationale ?? ""));
      setCell(sheet, r, cols.reviewer_notes, "");

      if (mode === "STRUCTURED") {
        setCell(sheet, r, cols.evidence_spans,          joinList(parsed.evidence_spans));
        setCell(sheet, r, cols.factors_for_decision,    joinList(parsed.factors_for_decision));
        setCell(sheet, r, cols.factors_against_decision, joinList(parsed.factors_against_decision));
        setCell(sheet, r, cols.counterfactual_change,   parsed.counterfactual_change ?? "");
      }

      successCount++;
      appendLog("eval-log", `[${label}] OK — ${parsed.decision}`, "log-ok");
    } catch (err) {
      failCount++;
      appendLog("eval-log", `[${label}] ERROR: ${err.message}`, "log-err");
    }

    progressBar.value = i + 1;
    if (evalStopRequested) break;
  }

  const stopped = evalStopRequested;
  const summary = stopped
    ? `Stopped after ${successCount} row(s).${failCount > 0 ? ` ${failCount} failed.` : ""}`
    : failCount === 0
      ? `All ${successCount} row(s) evaluated successfully.`
      : `${successCount} succeeded, ${failCount} failed. See log for details.`;

  progressLabel.textContent = `${stopped ? "Stopped" : "Done"} — ${summary}`;
  appendLog("eval-log", `${stopped ? "Stopped." : "Finished."} ${summary}`, "log-info");

  document.getElementById("eval-results-summary").textContent = summary;
  document.getElementById("eval-results-section").style.display = "block";
  document.getElementById("eval-generate-btn").disabled = false;
  document.getElementById("eval-stop-btn").style.display = "none";
}

function downloadEvalXlsx() {
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, evalWorkbook.Sheets["eval"], "eval");
  const outBuf = XLSX.write(wb, { bookType: "xlsx", type: "array" });
  const blob = new Blob([outBuf], {
    type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
  });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "eval_filled.xlsx";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
</script>
