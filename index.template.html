<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Bulk Surveillance Counterfactual Pair Generator</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 { font-size: 1.4rem; margin: 0 0 .25rem; }
    .subtitle { color: #666; font-size: .9rem; margin: 0 0 1.25rem; }
    .tab-nav {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #e0e0e0;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      padding: .5rem 1.2rem;
      font-size: .95rem;
      font-weight: 500;
      color: #666;
      cursor: pointer;
    }
    .tab-btn.active { color: #0066cc; border-bottom-color: #0066cc; }
    .tab-btn:hover:not(.active) { color: #333; }
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card h2 { font-size: 1rem; margin: 0 0 1rem; color: #444; }
    label { display: block; margin-bottom: 1.1rem; }
    label:last-child { margin-bottom: 0; }
    .label-text { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .35rem; color: #333; }
    input[type="password"], input[type="file"] {
      width: 100%;
      padding: .5rem .7rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: .95rem;
      background: #fff;
    }
    input[type="password"]:focus, input[type="file"]:focus {
      outline: 2px solid #0066cc;
      border-color: transparent;
    }
    .field-input {
      width: 100%;
      padding: .5rem .7rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: .95rem;
      background: #fff;
    }
    .field-input:focus {
      outline: 2px solid #0066cc;
      border-color: transparent;
    }
    .btn {
      display: inline-block;
      padding: .55rem 1.4rem;
      border: none;
      border-radius: 5px;
      font-size: .95rem;
      cursor: pointer;
      font-weight: 500;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: #0066cc; color: #fff; }
    .btn-primary:not(:disabled):hover { background: #0055aa; }
    .btn-success { background: #1a7f4b; color: #fff; margin-right: .5rem; }
    .btn-success:hover { background: #156640; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-danger:hover { background: #a93226; }
    .progress-label { font-size: .9rem; color: #555; margin: 0 0 .5rem; }
    progress {
      width: 100%;
      height: 10px;
      border-radius: 5px;
      border: none;
      appearance: none;
      -webkit-appearance: none;
      background: #e0e0e0;
    }
    progress::-webkit-progress-bar { background: #e0e0e0; border-radius: 5px; }
    progress::-webkit-progress-value { background: #0066cc; border-radius: 5px; transition: width .2s; }
    progress::-moz-progress-bar { background: #0066cc; border-radius: 5px; }
    .log {
      margin-top: 1rem;
      background: #1a1a1a;
      color: #d4d4d4;
      border-radius: 5px;
      padding: .85rem 1rem;
      height: 220px;
      overflow-y: auto;
      font-family: "Menlo", "Consolas", monospace;
      font-size: .8rem;
      line-height: 1.6;
    }
    .log-ok { color: #6bcb77; }
    .log-err { color: #ff6b6b; }
    .log-info { color: #74b9ff; }
    .summary { font-size: .95rem; color: #444; margin: 0 0 1rem; }
  </style>
</head>
<body>

<h1>AI Bulk Surveillance Counterfactual Pair Generator</h1>
<p class="subtitle">Generate and evaluate CASE_A / CASE_B post pairs via OpenRouter.</p>

<div class="tab-nav">
  <button class="tab-btn active" id="tab-btn-generate" onclick="showTab('generate')">Generate pairs</button>
  <button class="tab-btn" id="tab-btn-evaluate" onclick="showTab('evaluate')">Evaluate posts</button>
</div>

<!-- ── Generate tab ─────────────────────────────────────────────────────── -->
<div id="tab-generate">

<div class="card">
  <h2>Configuration</h2>
  <label>
    <span class="label-text">OpenRouter API Key</span>
    <input type="password" id="gen-api-key" placeholder="sk-or-v1-…" autocomplete="off">
  </label>
  <label>
    <span class="label-text">Temperature</span>
    <input type="number" id="gen-temperature" value="0.7" min="0" max="2" step="0.1" class="field-input" style="width:120px;">
  </label>
  <label>
    <span class="label-text">Parameters file (.xlsx — sheet must be named "parameters")</span>
    <input type="file" id="gen-xlsx-file" accept=".xlsx">
  </label>
  <button class="btn btn-primary" id="gen-generate-btn" onclick="startGeneration()">Generate pairs</button>
  <button class="btn btn-danger" id="gen-stop-btn" onclick="stopGeneration()" style="display:none; margin-left:.5rem;">Stop</button>
</div>

<div class="card" id="gen-progress-section" style="display:none">
  <h2>Progress</h2>
  <p class="progress-label" id="gen-progress-label">Initialising…</p>
  <progress id="gen-progress-bar" value="0" max="1"></progress>
  <div class="log" id="gen-log"></div>
</div>

<div class="card" id="gen-results-section" style="display:none">
  <h2>Results</h2>
  <p class="summary" id="gen-results-summary"></p>
  <button class="btn btn-success" onclick="downloadGenJson()">Download generated_posts.json</button>
  <button class="btn btn-success" onclick="downloadGenXlsx()">Download generated_posts.xlsx</button>
</div>

</div><!-- /tab-generate -->

<!-- ── Evaluate tab ─────────────────────────────────────────────────────── -->
<div id="tab-evaluate" style="display:none">

<div class="card">
  <h2>Configuration</h2>
  <label>
    <span class="label-text">OpenRouter API Key</span>
    <input type="password" id="eval-api-key" placeholder="sk-or-v1-…" autocomplete="off">
  </label>
  <label>
    <span class="label-text">Temperature</span>
    <input type="number" id="eval-temperature" value="0.0" min="0" max="2" step="0.1" class="field-input" style="width:120px;">
  </label>
  <label>
    <span class="label-text">Mode</span>
    <select id="eval-mode" class="field-input">
      <option value="RATIONALE">Rationale mode</option>
      <option value="STRUCTURED">Structured output mode</option>
    </select>
  </label>
  <label>
    <span class="label-text">Eval file (.xlsx — sheet must be named "eval")</span>
    <input type="file" id="eval-xlsx-file" accept=".xlsx">
  </label>
  <button class="btn btn-primary" id="eval-generate-btn" onclick="startEvaluation()">Evaluate posts</button>
  <button class="btn btn-danger" id="eval-stop-btn" onclick="stopEvaluation()" style="display:none; margin-left:.5rem;">Stop</button>
</div>

<div class="card" id="eval-progress-section" style="display:none">
  <h2>Progress</h2>
  <p class="progress-label" id="eval-progress-label">Initialising…</p>
  <progress id="eval-progress-bar" value="0" max="1"></progress>
  <div class="log" id="eval-log"></div>
</div>

<div class="card" id="eval-results-section" style="display:none">
  <h2>Results</h2>
  <p class="summary" id="eval-results-summary"></p>
  <button class="btn btn-success" onclick="downloadEvalXlsx()">Download filled eval.xlsx</button>
</div>

</div><!-- /tab-evaluate -->

<script>
// ── Shared ────────────────────────────────────────────────────────────────────

const LANG_MAP = { EN: "English", FR: "French", PL: "Polish" };

function showTab(name) {
  document.getElementById("tab-generate").style.display = name === "generate" ? "block" : "none";
  document.getElementById("tab-evaluate").style.display = name === "evaluate" ? "block" : "none";
  document.getElementById("tab-btn-generate").classList.toggle("active", name === "generate");
  document.getElementById("tab-btn-evaluate").classList.toggle("active", name === "evaluate");
}

async function callApi(apiKey, prompt, modelId, temperature) {
  const resp = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${apiKey}`,
    },
    body: JSON.stringify({
      model: modelId,
      messages: [{ role: "user", content: prompt }],
      temperature: temperature,
    }),
  });

  if (!resp.ok) {
    const text = await resp.text().catch(() => "");
    throw new Error(`API error ${resp.status}: ${text.slice(0, 300)}`);
  }

  const data = await resp.json();
  const content = data?.choices?.[0]?.message?.content;
  if (!content) throw new Error("API returned no content");
  return content;
}

function appendLog(logId, msg, cls) {
  const logEl = document.getElementById(logId);
  const line = document.createElement("div");
  line.textContent = msg;
  if (cls) line.className = cls;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Generate tab ──────────────────────────────────────────────────────────────

const PROMPT_TEMPLATE = `__PROMPT_GENERATE__`;
const SHARED_VARIABLE_KEYS = __SHARED_VARIABLE_KEYS__;

let generatedPostsResult = null;
let genStopRequested = false;

function stopGeneration() {
  genStopRequested = true;
  document.getElementById("gen-stop-btn").disabled = true;
  appendLog("gen-log", "Stop requested — finishing current pair…", "log-info");
}

function renderPrompt(row, language) {
  let prompt = PROMPT_TEMPLATE;
  const changedKey = row["changed_variable"];
  const caseAValue = row["case_a_value"];
  const caseBValue = row["case_b_value"];

  for (const key of SHARED_VARIABLE_KEYS) {
    const value =
      key === changedKey
        ? `CASE_A=${caseAValue}; CASE_B=${caseBValue}`
        : String(row[key] ?? "");
    prompt = prompt.split(`{${key}}`).join(value);
  }

  prompt = prompt.split("{changed_variable}").join(changedKey);
  prompt = prompt.split("{case_a_value}").join(caseAValue);
  prompt = prompt.split("{case_b_value}").join(caseBValue);
  prompt = prompt.split("{language}").join(language);
  return prompt;
}

function parseCasePair(response) {
  const match = response.trim().match(/CASE_A:\s*([\s\S]*?)\s*CASE_B:\s*([\s\S]*?)\s*$/);
  if (!match) throw new Error("Response did not match expected CASE_A / CASE_B format");
  const caseA = match[1].trim();
  const caseB = match[2].trim();
  if (!caseA || !caseB) throw new Error("Model returned an empty CASE_A or CASE_B");
  return [caseA, caseB];
}

async function startGeneration() {
  const apiKey = document.getElementById("gen-api-key").value.trim();
  const temperature = parseFloat(document.getElementById("gen-temperature").value);
  const fileInput = document.getElementById("gen-xlsx-file");

  if (!apiKey) { alert("Please enter your OpenRouter API key."); return; }
  if (isNaN(temperature)) { alert("Please enter a valid temperature."); return; }
  if (!fileInput.files.length) { alert("Please select an .xlsx file."); return; }

  let rows;
  try {
    const buffer = await fileInput.files[0].arrayBuffer();
    const wb = XLSX.read(buffer);
    const sheet = wb.Sheets["parameters"];
    if (!sheet) throw new Error("Sheet 'parameters' not found.");
    rows = XLSX.utils.sheet_to_json(sheet, { range: 1 });
    if (!rows.length) throw new Error("No data rows found in 'parameters' sheet.");
  } catch (err) {
    alert(`Failed to read xlsx: ${err.message}`);
    return;
  }

  genStopRequested = false;
  document.getElementById("gen-generate-btn").disabled = true;
  document.getElementById("gen-stop-btn").style.display = "inline-block";
  document.getElementById("gen-stop-btn").disabled = false;
  document.getElementById("gen-progress-section").style.display = "block";
  document.getElementById("gen-results-section").style.display = "none";
  document.getElementById("gen-log").innerHTML = "";

  const progressBar = document.getElementById("gen-progress-bar");
  const progressLabel = document.getElementById("gen-progress-label");
  progressBar.max = rows.length;
  progressBar.value = 0;

  const generatedPosts = {};
  let successCount = 0;
  let failCount = 0;

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const pairId = String(row["pair_id"] ?? `P${String(i + 1).padStart(3, "0")}`);
    const modelId = String(row["target_model"] ?? "").trim();
    const langCode = String(row["target_lang"] ?? "").trim().toUpperCase();
    const language = LANG_MAP[langCode] ?? langCode;

    progressLabel.textContent = `Pair ${i + 1} / ${rows.length}  —  ${pairId}`;
    progressBar.value = i;
    appendLog("gen-log", `[${pairId}] Generating… (model: ${modelId || "—"}, lang: ${language || "—"})`);

    try {
      if (!modelId) throw new Error("target_model is missing for this row");
      const prompt = renderPrompt(row, language);
      const MAX_ATTEMPTS = 3;
      let caseAText, caseBText, lastErr;
      for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
        try {
          const response = await callApi(apiKey, prompt, modelId, temperature);
          [caseAText, caseBText] = parseCasePair(response);
          lastErr = null;
          break;
        } catch (err) {
          lastErr = err;
          if (attempt < MAX_ATTEMPTS) {
            appendLog("gen-log", `[${pairId}] Attempt ${attempt} failed (${err.message}) — retrying…`, "log-info");
          }
        }
      }
      if (lastErr) throw lastErr;

      generatedPosts[pairId] = { CASE_A: caseAText, CASE_B: caseBText };
      successCount++;
      appendLog("gen-log", `[${pairId}] OK`, "log-ok");
    } catch (err) {
      failCount++;
      appendLog("gen-log", `[${pairId}] ERROR: ${err.message}`, "log-err");
    }

    progressBar.value = i + 1;
    if (genStopRequested) break;
  }

  generatedPostsResult = generatedPosts;

  const stopped = genStopRequested;
  const summary = stopped
    ? `Stopped after ${successCount} pair(s).${failCount > 0 ? ` ${failCount} failed.` : ""}`
    : failCount === 0
      ? `All ${successCount} pair(s) generated successfully.`
      : `${successCount} succeeded, ${failCount} failed. See log for details.`;

  progressLabel.textContent = `${stopped ? "Stopped" : "Done"} — ${summary}`;
  appendLog("gen-log", `${stopped ? "Stopped." : "Finished."} ${summary}`, "log-info");

  document.getElementById("gen-results-summary").textContent = summary;
  document.getElementById("gen-results-section").style.display = "block";
  document.getElementById("gen-generate-btn").disabled = false;
  document.getElementById("gen-stop-btn").style.display = "none";
}

function downloadGenJson() {
  const blob = new Blob([JSON.stringify(generatedPostsResult, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "generated_posts.json";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function downloadGenXlsx() {
  const rows = Object.values(generatedPostsResult).map(cases => ({
    generated_case_a: cases.CASE_A,
    generated_case_b: cases.CASE_B,
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "generated_posts");
  XLSX.writeFile(wb, "generated_posts.xlsx");
}

// ── Evaluate tab ──────────────────────────────────────────────────────────────

const EVAL_PROMPTS = {
  RATIONALE:  `__PROMPT_DECISION_SIMPLE__`,
  STRUCTURED: `__PROMPT_DECISION_STRUCT__`,
};

const EVAL_PROMPT_IDS = {
  RATIONALE:  "prompt_decision_simple.md",
  STRUCTURED: "prompt_decision_struct.md",
};

// 0-based column indices matching the eval sheet layout
const EVAL_INPUT_COL_MODEL = 2;  // C: target_model
const EVAL_INPUT_COL_POST  = 4;  // E: evaluated_post
const EVAL_OUTPUT_COLS = {
  RATIONALE: {
    model_id: 5, prompt_id: 6, generated_on: 7,
    decision: 8, short_rationale: 9, reviewer_notes: 10,
  },
  STRUCTURED: {
    model_id: 11, prompt_id: 12, generated_on: 13,
    decision: 14, evidence_spans: 15, factors_for_decision: 16,
    factors_against_decision: 17, counterfactual_change: 18,
    short_rationale: 19, reviewer_notes: 20,
  },
};

let evalWorkbook = null;
let evalStopRequested = false;

function stopEvaluation() {
  evalStopRequested = true;
  document.getElementById("eval-stop-btn").disabled = true;
  appendLog("eval-log", "Stop requested — finishing current post…", "log-info");
}

function getCell(sheet, r, c) {
  const addr = XLSX.utils.encode_cell({ r, c });
  const cell = sheet[addr];
  return cell ? String(cell.v ?? "") : "";
}

function setCell(sheet, r, c, value) {
  const addr = XLSX.utils.encode_cell({ r, c });
  sheet[addr] = { v: value, t: "s" };
  // Expand sheet range if needed
  const range = XLSX.utils.decode_range(sheet["!ref"] || "A1:A1");
  if (r > range.e.r) range.e.r = r;
  if (c > range.e.c) range.e.c = c;
  sheet["!ref"] = XLSX.utils.encode_range(range);
}

function parseJsonResponse(text) {
  let t = text.trim();
  t = t.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/i, "").trim();
  return JSON.parse(t);
}

function joinList(value) {
  if (Array.isArray(value)) return value.join("\n");
  return value != null ? String(value) : "";
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

async function startEvaluation() {
  const apiKey = document.getElementById("eval-api-key").value.trim();
  const temperature = parseFloat(document.getElementById("eval-temperature").value);
  const mode = document.getElementById("eval-mode").value;
  const fileInput = document.getElementById("eval-xlsx-file");

  if (!apiKey) { alert("Please enter your OpenRouter API key."); return; }
  if (isNaN(temperature)) { alert("Please enter a valid temperature."); return; }
  if (!fileInput.files.length) { alert("Please select an .xlsx file."); return; }

  let wb;
  try {
    const buffer = await fileInput.files[0].arrayBuffer();
    wb = XLSX.read(buffer, { type: "array" });
    if (!wb.Sheets["eval"]) throw new Error("Sheet 'eval' not found.");
  } catch (err) {
    alert(`Failed to read xlsx: ${err.message}`);
    return;
  }

  const sheet = wb.Sheets["eval"];
  const range = XLSX.utils.decode_range(sheet["!ref"]);

  // Collect data rows (0-based row 2+, skipping two header rows)
  const dataRows = [];
  for (let r = 2; r <= range.e.r; r++) {
    const post = getCell(sheet, r, EVAL_INPUT_COL_POST);
    if (!post) continue;
    const alreadyFilled = getCell(sheet, r, EVAL_OUTPUT_COLS[mode].model_id);
    if (alreadyFilled) continue;
    dataRows.push(r);
  }

  if (!dataRows.length) {
    alert("Nothing to evaluate: no posts found, or all rows already filled for this mode.");
    return;
  }

  evalStopRequested = false;
  evalWorkbook = wb;

  document.getElementById("eval-generate-btn").disabled = true;
  document.getElementById("eval-stop-btn").style.display = "inline-block";
  document.getElementById("eval-stop-btn").disabled = false;
  document.getElementById("eval-progress-section").style.display = "block";
  document.getElementById("eval-results-section").style.display = "none";
  document.getElementById("eval-log").innerHTML = "";

  const progressBar = document.getElementById("eval-progress-bar");
  const progressLabel = document.getElementById("eval-progress-label");
  progressBar.max = dataRows.length;
  progressBar.value = 0;

  const cols = EVAL_OUTPUT_COLS[mode];
  const promptTemplate = EVAL_PROMPTS[mode];
  const promptId = EVAL_PROMPT_IDS[mode];
  const generatedOn = today();
  let successCount = 0;
  let failCount = 0;

  for (let i = 0; i < dataRows.length; i++) {
    const r = dataRows[i];
    const postText = getCell(sheet, r, EVAL_INPUT_COL_POST);
    const modelId = getCell(sheet, r, EVAL_INPUT_COL_MODEL);
    const pairId = getCell(sheet, r, 0);
    const caseSide = getCell(sheet, r, 1);
    const label = `${pairId}/${caseSide}`;

    progressLabel.textContent = `Row ${i + 1} / ${dataRows.length}  —  ${label}`;
    progressBar.value = i;
    appendLog("eval-log", `[${label}] Evaluating…`);

    try {
      if (!modelId) throw new Error("target_model is missing for this row");

      const prompt = promptTemplate.replace("{post}", postText);
      const MAX_ATTEMPTS = 3;
      let parsed = null;
      let lastErr = null;

      for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
        try {
          const raw = await callApi(apiKey, prompt, modelId, temperature);
          parsed = parseJsonResponse(raw);
          lastErr = null;
          break;
        } catch (err) {
          lastErr = err;
          if (attempt < MAX_ATTEMPTS) {
            appendLog("eval-log", `[${label}] Attempt ${attempt} failed (${err.message}) — retrying…`, "log-info");
          }
        }
      }
      if (lastErr) throw lastErr;

      setCell(sheet, r, cols.model_id, modelId);
      setCell(sheet, r, cols.prompt_id, promptId);
      setCell(sheet, r, cols.generated_on, generatedOn);
      setCell(sheet, r, cols.decision, parsed.decision ?? "");
      setCell(sheet, r, cols.short_rationale,
        mode === "RATIONALE" ? (parsed.rationale ?? "") : (parsed.short_rationale ?? ""));
      setCell(sheet, r, cols.reviewer_notes, "");

      if (mode === "STRUCTURED") {
        setCell(sheet, r, cols.evidence_spans,          joinList(parsed.evidence_spans));
        setCell(sheet, r, cols.factors_for_decision,    joinList(parsed.factors_for_decision));
        setCell(sheet, r, cols.factors_against_decision, joinList(parsed.factors_against_decision));
        setCell(sheet, r, cols.counterfactual_change,   parsed.counterfactual_change ?? "");
      }

      successCount++;
      appendLog("eval-log", `[${label}] OK — ${parsed.decision}`, "log-ok");
    } catch (err) {
      failCount++;
      appendLog("eval-log", `[${label}] ERROR: ${err.message}`, "log-err");
    }

    progressBar.value = i + 1;
    if (evalStopRequested) break;
  }

  const stopped = evalStopRequested;
  const summary = stopped
    ? `Stopped after ${successCount} row(s).${failCount > 0 ? ` ${failCount} failed.` : ""}`
    : failCount === 0
      ? `All ${successCount} row(s) evaluated successfully.`
      : `${successCount} succeeded, ${failCount} failed. See log for details.`;

  progressLabel.textContent = `${stopped ? "Stopped" : "Done"} — ${summary}`;
  appendLog("eval-log", `${stopped ? "Stopped." : "Finished."} ${summary}`, "log-info");

  document.getElementById("eval-results-summary").textContent = summary;
  document.getElementById("eval-results-section").style.display = "block";
  document.getElementById("eval-generate-btn").disabled = false;
  document.getElementById("eval-stop-btn").style.display = "none";
}

function downloadEvalXlsx() {
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, evalWorkbook.Sheets["eval"], "eval");
  const outBuf = XLSX.write(wb, { bookType: "xlsx", type: "array" });
  const blob = new Blob([outBuf], {
    type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
  });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "eval_filled.xlsx";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
</script>
</body>
